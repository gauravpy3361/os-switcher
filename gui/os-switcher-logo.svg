<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f1c2c" />
      <stop offset="100%" stop-color="#928dab" />
    </linearGradient>
    <linearGradient id="blueArrow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c6ff" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>
    <linearGradient id="orangeArrow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f857a6" />
      <stop offset="100%" stop-color="#ff5858" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>
  <!-- Background Card -->
  <rect width="256" height="256" rx="64" fill="url(#bg)" />
  
  <!-- Outer Ring abstract arrows representing the OS switch -->
  <g filter="url(#shadow)">
    <!-- First Arrow (Top-Right) -->
    <path d="M 128,40 A 88,88 0 0,1 216,128 L 192,128 A 64,64 0 0,0 128,64 L 128,88 L 88,48 L 128,8 Z" fill="url(#blueArrow)" />
    <!-- Second Arrow (Bottom-Left) -->
    <path d="M 128,216 A 88,88 0 0,1 40,128 L 64,128 A 64,64 0 0,0 128,192 L 128,168 L 168,208 L 128,248 Z" fill="url(#orangeArrow)" transform="rotate(180 128 128)" />
  </g>
  
  <!-- Sleek central abstract dual-boot signifier -->
  <circle cx="128" cy="128" r="32" fill="#ffffff" opacity="0.1" />
  <path d="M 112,128 L 144,128 M 128,112 L 128,144" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.8" />
</svg>
